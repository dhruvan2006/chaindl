name: Linting

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Ruff and Mypy
        run: pip install ruff mypy
      - name: Run Ruff
        run: ruff check . && ruff format --check .
